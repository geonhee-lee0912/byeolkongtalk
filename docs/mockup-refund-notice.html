<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>환불 안내 목업</title>
<style>
  :root{
    --cream:#FAF6F0; --cream-warm:#FFF8F0;
    --lilac-soft:#E8DEF5; --lilac:#D4C7EE; --lilac-mid:#B8A8D8; --lilac-deep:#9F8AD0;
    --gold:#E8C26A; --gold-soft:#F2D78A;
    --eye-purple:#5A3E8C; --text-light:#7A6BA0;
    --night:#1F1735; --night-deep:#2A1F4D;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    background:linear-gradient(180deg,var(--cream) 0%,var(--lilac-soft) 100%);
    min-height:100vh;display:flex;justify-content:center;padding:28px 0;
  }
  .phone{width:390px;}
  .pgtitle{text-align:center;color:var(--eye-purple);font-size:20px;font-weight:800;margin:6px 0 18px;}
  .stack{padding:0 20px;display:flex;flex-direction:column;gap:8px;}

  /* 공통 카드 (운세 페이지 상단 카드들) */
  .card{
    border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px;
    background:linear-gradient(135deg,var(--night),var(--night-deep));
  }
  .avatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto;}
  .body{flex:1;min-width:0;}
  .title{font-size:13px;font-weight:600;line-height:1.2;}
  .sub{font-size:11px;margin-top:5px;display:flex;align-items:center;gap:6px;line-height:1.3;}

  /* 환불 안내 카드 (신규) */
  .refund{border:1px solid rgba(250,246,240,.20);}
  .refund .avatar{background:rgba(250,246,240,.10);}
  .refund .title{color:var(--cream);}
  .refund .sub{color:rgba(250,246,240,.60);}
  .ackbtn{
    flex:0 0 auto;font-size:12px;color:var(--gold-soft);
    border:1px solid rgba(232,194,106,.30);border-radius:8px;
    padding:6px 12px;background:transparent;cursor:pointer;
  }
  .ackbtn:active{transform:scale(.95);}

  /* 생성 중 카드 (기존) */
  .gen{border:1px solid rgba(232,194,106,.30);}
  .gen .avatar{background:rgba(232,194,106,.15);}
  .gen .title{color:var(--gold-soft);}
  .gen .sub{color:rgba(250,246,240,.60);}
  .spin{width:12px;height:12px;border-radius:50%;border:2px solid rgba(232,194,106,.30);border-top-color:var(--gold);animation:spin 1s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* 보러가기 카드 (기존) */
  .done{border:1px solid rgba(232,194,106,.30);}
  .done .avatar{background:rgba(232,194,106,.15);}
  .done .title{color:var(--gold-soft);}
  .done .sub{color:var(--gold);}
  .chev{color:rgba(250,246,240,.40);font-size:15px;flex:0 0 auto;}

  .note{margin:18px 20px 0;font-size:11px;color:var(--text-light);line-height:1.6;}
  .note b{color:var(--eye-purple);}
  .lbl{display:inline-block;font-size:10px;font-weight:700;color:var(--lilac-deep);margin:18px 0 6px 20px;letter-spacing:.3px;}
</style>
</head>
<body>
  <div class="phone">
    <div class="pgtitle">별콩 운세</div>

    <span class="lbl">① 환불 안내 카드 (신규 — 리포트 생성 실패 시)</span>
    <div class="stack">
      <div class="card refund">
        <div class="avatar">🃏</div>
        <div class="body">
          <div class="title">오늘의 타로</div>
          <div class="sub">리포트를 못 만들어서 5별을 돌려줬어 🙏</div>
        </div>
        <button class="ackbtn">확인</button>
      </div>

      <div class="card refund">
        <div class="avatar">💗</div>
        <div class="body">
          <div class="title">연애운 타로</div>
          <div class="sub">리포트를 못 만들어서 15별을 돌려줬어 🙏</div>
        </div>
        <button class="ackbtn">확인</button>
      </div>
    </div>

    <span class="lbl">② 비교용 — 기존 생성중 / 보러가기 카드</span>
    <div class="stack">
      <div class="card gen">
        <div class="avatar">🗓️</div>
        <div class="body">
          <div class="title">이번달 어떤 일들이?</div>
          <div class="sub"><span class="spin"></span>별콩이가 리포트를 만들고 있어…</div>
        </div>
      </div>

      <div class="card done">
        <div class="avatar">💰</div>
        <div class="body">
          <div class="title">금전운 타로</div>
          <div class="sub">✨ 리포트가 준비됐어 · 보러가기 →</div>
        </div>
        <span class="chev">›</span>
      </div>
    </div>

    <p class="note">
      <b>확인</b>을 누르면 서버에 기록돼 다시 뜨지 않아.<br/>
      탭을 닫거나 다른 기기에서 접속해도, 확인 전까지는 계속 보여줘.
    </p>
  </div>
</body>
</html>
